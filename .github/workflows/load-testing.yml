name: Load Testing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run planned load scenarios
        run: |
          node tests/performance/load-test.js --scenario=users100
          node tests/performance/load-test.js --scenario=users500
          node tests/performance/load-test.js --scenario=users1000

      - name: Generate regression report
        run: node performance/benchmark-dashboard.js --report

      - name: Alert on degradation threshold
        run: |
          echo "Trigger alert if p95 latency regression exceeds 20%"
