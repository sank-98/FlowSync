# Google Cloud Build Configuration
# Automates: Build → Push → Deploy on every push to main

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/flowsync:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/flowsync:latest'
      - '.'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/flowsync:$COMMIT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'flowsync'
      - '--image'
      - 'gcr.io/$PROJECT_ID/flowsync:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},GOOGLE_GEMINI_API_KEY=${_GOOGLE_GEMINI_API_KEY}'
      - '--set-secrets'
      - 'JWT_SECRET=projects/${PROJECT_ID}/secrets/JWT_SECRET:latest,CSRF_SECRET=projects/${PROJECT_ID}/secrets/CSRF_SECRET:latest'
      - '--max-instances=100'
      - '--memory=512Mi'
      - '--cpu=1'

images:
  - 'gcr.io/$PROJECT_ID/flowsync:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/flowsync:latest'

substitutions:
  _FIREBASE_PROJECT_ID: 'your-firebase-project'
  _GOOGLE_GEMINI_API_KEY: 'your-gemini-key'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'
